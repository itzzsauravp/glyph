<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glyph Brainstorm</title>
    <!-- Highlight.js dark theme (VS 2015 style) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/vs2015.min.css">
    <style>
        :root {
            --primary: var(--vscode-button-background);
            --primary-hover: var(--vscode-button-hoverBackground);
            --bg-body: var(--vscode-editor-background);
            --text-main: var(--vscode-editor-foreground);
            --input-bg: var(--vscode-input-background);
            --input-border: var(--vscode-input-border);
            --input-fg: var(--vscode-input-foreground);
            --message-bg-ai: var(--vscode-editorWidget-background);
            --message-bg-user: var(--vscode-textBlockQuote-background);
            --message-border: var(--vscode-widget-border);
        }

        body {
            font-family: var(--vscode-font-family), system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 95%;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 13px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease-out forwards;
        }

        .message-user {
            align-self: flex-end;
            background-color: var(--message-bg-user);
            border-bottom-right-radius: 2px;
            color: var(--text-main);
            white-space: pre-wrap;
        }

        .message-ai {
            align-self: flex-start;
            background-color: var(--message-bg-ai);
            border: 1px solid var(--message-border);
            border-bottom-left-radius: 2px;
            width: 100%;
        }

        /* Markdown Spacing fixes */
        .message-ai p { margin-top: 0; margin-bottom: 0.75em; }
        .message-ai p:last-child { margin-bottom: 0; }
        .message-ai pre { margin: 0.5rem 0; overflow-x: auto; border-radius: 4px; }
        .message-ai code { font-family: var(--vscode-editor-font-family), monospace; font-size: 12px; background-color: rgba(0,0,0,0.2); padding: 2px 4px; border-radius: 3px; }
        .message-ai pre code { padding: 0; background-color: transparent; }
        
        /* Custom Code Block Styling */
        .code-block-wrapper {
            background-color: #1e1e1e;
            border: 1px solid var(--message-border);
            border-radius: 6px;
            overflow: hidden;
            margin: 0.75rem 0;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #2d2d2d;
            padding: 4px 12px;
            color: #d4d4d4;
            font-size: 11px;
            border-bottom: 1px solid var(--message-border);
        }

        .code-lang {
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.8;
        }

        .copy-btn {
            background-color: transparent;
            color: #d4d4d4;
            border: 1px solid #4d4d4d;
            border-radius: 4px;
            padding: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .copy-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .copy-btn.copied {
            border-color: #28a745;
            color: #28a745;
        }

        pre.hljs {
            margin: 0;
            padding: 12px;
        }

        /* Standalone Thinking Dots */
        .thinking-container {
            display: none;
            padding: 0.5rem 1rem;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
            opacity: 0.7;
        }

        .thinking-container.active {
            display: flex;
        }

        .dot-anim span {
            animation: bounce 1.4s infinite ease-in-out both;
            display: inline-block;
            font-size: 18px;
            line-height: 10px;
        }

        .dot-anim span:nth-child(1) { animation-delay: -0.32s; }
        .dot-anim span:nth-child(2) { animation-delay: -0.16s; }

        /* Tools and Input Container */
        .input-container {
            padding: 0;
            border-top: 1px solid var(--message-border);
            display: flex;
            flex-direction: column;
            background-color: var(--bg-body);
        }

        .context-toolbar {
            display: flex;
            padding: 8px 12px;
            background-color: rgba(0,0,0,0.1);
            border-bottom: 1px solid var(--message-border);
            align-items: center;
            gap: 8px;
            overflow-x: auto;
        }

        .context-controls {
            display: flex;
            gap: 6px;
        }

        .context-controls button, #model-selector {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--message-border);
            border-radius: 4px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        #model-selector {
            outline: none;
            max-width: 150px;
        }

        .context-controls button:hover, #model-selector:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .context-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .context-chip {
            background-color: var(--primary);
            color: var(--text-main);
            padding: 2px 6px;
            font-size: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            opacity: 0.9;
        }

        .input-wrapper {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        textarea {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--input-bg);
            color: var(--input-fg);
            border: 1px solid var(--input-border);
            border-radius: 4px;
            padding: 0.5rem;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus { border-color: var(--primary); }

        .button-row {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        button {
            background-color: var(--primary);
            color: var(--text-main);
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        button:hover { background-color: var(--primary-hover); }

        .error-message {
            color: var(--vscode-errorForeground);
            font-size: 12px;
            margin-top: 4px;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chat-container">
        <!-- Messages go here -->
    </div>

    <!-- Transparent Thinking below chat bubbles -->
    <div class="thinking-container" id="thinking-indicator">
        <span id="thinking-name">AI</span> is thinking
        <div class="dot-anim">
            <span>.</span><span>.</span><span>.</span>
        </div>
    </div>

    <div class="input-container">
        <div class="context-toolbar">
            <select id="model-selector">
                <option value="" disabled selected>Loading Models...</option>
            </select>
            <div class="context-controls">
                <button type="button" id="add-buffer-btn" title="Add Current File to Context">⊕ Buffer</button>
                <button type="button" id="add-codebase-btn" title="Add Relevant Files to Context">⊕ Codebase</button>
            </div>
            <div class="context-chips" id="context-chips">
                <!-- Context chips appear here -->
            </div>
        </div>

        <div class="input-wrapper">
            <div class="error-message" id="error-display"></div>
            <textarea id="prompt-input" rows="3" placeholder="Ask Glyph a question... (Shift+Enter for newline)"></textarea>
            <div class="button-row">
                <button type="button" id="clear-btn" style="background-color: transparent; border: 1px solid var(--message-border)">New Chat</button>
                <button type="button" id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script> 
        const vscode = acquireVsCodeApi();
        
        const chatContainer = document.getElementById('chat-container');
        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const errorDisplay = document.getElementById('error-display');
        const thinkingIndicator = document.getElementById('thinking-indicator');
        const thinkingName = document.getElementById('thinking-name');
        
        const addBufferBtn = document.getElementById('add-buffer-btn');
        const addCodebaseBtn = document.getElementById('add-codebase-btn');
        const contextChips = document.getElementById('context-chips');
        const modelSelector = document.getElementById('model-selector');

        let currentAiMessageElement = null;
        let currentModelName = '';
        const activeContexts = [];

        // Notify provider we're ready
        vscode.postMessage({ type: 'webview-ready' });

        function appendMessage(role, _isHtml = false) {
            const el = document.createElement('div');
            el.className = `message message-${role}`;
            chatContainer.appendChild(el);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return el;
        }

        // Global Copy Button Event Listener
        chatContainer.addEventListener('click', (e) => {
            if (e.target?.classList.contains('copy-btn')) {
                const btn = e.target;
                const rawText = btn.getAttribute('data-clipboard');
                
                if (rawText) {
                    navigator.clipboard.writeText(rawText).then(() => {
                        btn.classList.add('copied');
                        const copyIcon = btn.querySelector('.copy-icon-wrapper');
                        const checkIcon = btn.querySelector('.check-icon');
                        if (copyIcon && checkIcon) {
                            copyIcon.style.display = 'none';
                            checkIcon.style.display = 'inline-block';
                            setTimeout(() => {
                                copyIcon.style.display = 'inline-block';
                                checkIcon.style.display = 'none';
                                btn.classList.remove('copied');
                            }, 2000);
                        }
                    }).catch(err => {
                        console.error('Failed to copy text: ', err);
                    });
                }
            }
        });

        // Add Context Buttons
        addBufferBtn.addEventListener('click', () => {
            vscode.postMessage({ type: 'add-context-buffer' });
        });

        addCodebaseBtn.addEventListener('click', () => {
            vscode.postMessage({ type: 'add-context-codebase' });
        });

        modelSelector.addEventListener('change', (e) => {
            vscode.postMessage({ type: 'change-model', value: e.target.value });
        });

        function addVisualChip(name) {
            // Prevent duplicate visual chips
            if (activeContexts.includes(name)) { return; }
            activeContexts.push(name);

            const chip = document.createElement('div');
            chip.className = 'context-chip';
            chip.textContent = name;
            contextChips.appendChild(chip);
        }

        function sendMessage() {
            const text = promptInput.value.trim();
            if (!text) { return; }

            errorDisplay.textContent = '';
            const userEl = appendMessage('user');
            userEl.textContent = text;
            promptInput.value = '';

            // Consume UI context and let backend know
            vscode.postMessage({
                type: 'chat-message',
                value: { text, contexts: activeContexts }
            });
            // Don't clear chips automatically. The user might want to keep chatting with the same context.
        }

        sendBtn.addEventListener('click', sendMessage);
        
        clearBtn.addEventListener('click', () => {
            vscode.postMessage({ type: 'clear-chat' });
            chatContainer.innerHTML = '';
            errorDisplay.textContent = '';
        });

        promptInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        const autoScroll = () => {
            // Keep scrolled to bottom if user hasn't scrolled up manually
            const threshold = 50;
            const position = chatContainer.scrollTop + chatContainer.offsetHeight;
            const height = chatContainer.scrollHeight;
            if (position >= height - threshold) {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        };

        window.addEventListener('message', event => {
            const message = event.data;
            switch (message.type) {
                case 'set-models-list':
                    modelSelector.innerHTML = '';
                    if (message.models && message.models.length > 0) {
                        message.models.forEach(model => {
                            const opt = document.createElement('option');
                            // model payload is { provider, name, id }
                            opt.value = JSON.stringify(model);
                            opt.textContent = `${model.provider}: ${model.name}`;
                            if (model.isCurrent) { opt.selected = true; }
                            modelSelector.appendChild(opt);
                        });
                    } else {
                        const opt = document.createElement('option');
                        opt.textContent = "No models registered";
                        modelSelector.appendChild(opt);
                    }
                    if (message.currentModel) { currentModelName = message.currentModel; }
                    break;
                case 'set-model-name':
                    currentModelName = message.value;
                    break;
                case 'context-added':
                    addVisualChip(message.value);
                    break;
                case 'set-thinking':
                    thinkingName.textContent = message.value || currentModelName || 'Glyph';
                    thinkingIndicator.classList.add('active');
                    autoScroll();
                    break;
                case 'stream-update':
                    thinkingIndicator.classList.remove('active');
                    if (!currentAiMessageElement) {
                        currentAiMessageElement = appendMessage('ai');
                    }
                    currentAiMessageElement.innerHTML = message.html;
                    autoScroll();
                    break;
                case 'generation-complete':
                    thinkingIndicator.classList.remove('active');
                    currentAiMessageElement = null;
                    break;
                case 'error-notification':
                    thinkingIndicator.classList.remove('active');
                    errorDisplay.textContent = message.value;
                    currentAiMessageElement = null;
                    break;
            }
        });
    </script>
</body>
</html>
